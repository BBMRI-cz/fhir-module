services:
  fhir-module:
    image: ghcr.io/bbmri-cz/fhir-module:latest
    container_name: fhir-module
    profiles:
      - dev
      - prod
    networks:
      - fhir-integration
      - monitoring
    restart: unless-stopped
    ports:
      - "5000:5000" # FHIR module port
      - "3000:3000" # UI port
    environment:
      BLAZE_URL: "${BLAZE_URL:-http://test-blaze:8080/fhir}"
      MIABIS_BLAZE_URL: "${MIABIS_BLAZE_URL:-http://miabis-blaze:8080/fhir}"
      MIABIS_ON_FHIR: "${MIABIS_ON_FHIR:-True}"
      ROOT_DIR: "/opt/test"
      DIR_PATH: "/opt/records"
      PYTHONWARNINGS: "ignore:Unverified HTTPS request"
    env_file:
      - .env
    command:
      [
        "/bin/sh",
        "-c",
        "chmod 666 /opt/fhir-module/util/shared_config.json && /usr/local/bin/startup.sh",
      ]
    volumes:
      - type: bind
        source: "test/xml_data"
        target: "/opt/records"
      - type: bind
        source: "test"
        target: "/opt/test"
      - type: bind
        source: "./util/shared_config.json"
        target: "/opt/fhir-module/util/shared_config.json"
      - fhir-logs:/var/log/fhir-module
      - ui-data:/app/data
      - config-snapshots:/opt/config-snapshots
    depends_on:
      - miabis-blaze
      - test-blaze
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -f http://localhost:3000 && curl -f http://localhost:5000/metrics",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  prometheus:
    image: prom/prometheus:latest
    profiles:
      - monitoring
    networks:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - type: bind
        source: "./config/prometheus.yml"
        target: "/etc/prometheus/prometheus.yml"
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"

  miabis-blaze:
    container_name: miabis-blaze
    image: "samply/blaze:latest"
    networks:
      - fhir-integration
      - monitoring
    profiles:
      - dev
      - prod
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx2g"
      DB_SEARCH_PARAM_BUNDLE: "/app/searchParamBundle.json"
      LOG_LEVEL: "debug"
    ports:
      - "5432:8080"
    volumes:
      - type: bind
        source: "util/searchParamBundle.json"
        target: "/app/searchParamBundle.json"

  test-blaze:
    container_name: test-blaze
    image: "samply/blaze:latest"
    networks:
      - fhir-integration
      - monitoring
    profiles:
      - dev
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx2g"
      DB_SEARCH_PARAM_BUNDLE: "/app/searchParamBundle.json"
      LOG_LEVEL: "debug"
    ports:
      - "8080:8080"
    volumes:
      - type: bind
        source: "util/searchParamBundle.json"
        target: "/app/searchParamBundle.json"

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    profiles:
      - monitoring
    networks:
      - monitoring
    volumes:
      - fhir-logs:/var/log/fhir-module:ro
      - type: bind
        source: "./config/promtail-config.yaml"
        target: "/etc/promtail/promtail-config.yaml"
    command: -config.file=/etc/promtail/promtail-config.yaml

networks:
  fhir-integration:
  monitoring:

volumes:
  prometheus_data:
  fhir-logs:
  ui-data:
  config-snapshots:
