version: 1
formatters:
  simple:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: simple
    stream: ext://sys.stdout
root:
  level: WARNING
  handlers: [console]

default:
  level: WARNING
  handlers: [console]

loggers:
  sync_logger:
    level: WARNING
    handlers: [console]
    propagate: no
  miabis_sync_logger:
    level: WARNING
    handlers: [console]
    propagate: no