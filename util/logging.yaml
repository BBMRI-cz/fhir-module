version: 1
formatters:
  simple:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  json:
    (): util.custom_logger.JsonFormatter
handlers:
  sync_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: /var/log/fhir-module/sync.log
    maxBytes: 10485760
    backupCount: 5
  miabis_sync_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: /var/log/fhir-module/miabis_sync.log
    maxBytes: 10485760
    backupCount: 5
  app_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: simple
    filename: /var/log/fhir-module/fhir-module.log
    maxBytes: 10485760
    backupCount: 5
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: simple
    stream: ext://sys.stdout
root:
  level: INFO
  handlers: [console, app_file]

loggers:
  sync_logger:
    level: INFO
    handlers: [sync_file, console]
    propagate: no
  miabis_sync_logger:
    level: INFO
    handlers: [miabis_sync_file, console]
    propagate: no
