services:
  fhir-module-debug:
    image: ghcr.io/bbmri-cz/fhir-module:debug
    container_name: fhir-module-debug
    profiles:
      - debug
    networks:
      - fhir-integration
      - monitoring
    restart: no
    ports:
      - "5000:5000"
      - "5678:5678" # Debug port
    environment:
      BLAZE_URL: "${BLAZE_URL:-http://test-blaze:8080/fhir}"
      MIABIS_BLAZE_URL: "${MIABIS_BLAZE_URL:-http://miabis-blaze:5432/fhir}"
      MIABIS_ON_FHIR: "${MIABIS_ON_FHIR:-True}"
      PYTHONWARNINGS: "ignore:Unverified HTTPS request"
      FLASK_ENV: "development"
      PYTHONUNBUFFERED: "1"
    volumes:
      - type: bind
        source: "test/xml_data"
        target: "/opt/records"
      - type: bind
        source: "test"
        target: "/opt/test"
      - type: bind
        source: "."
        target: "/opt/fhir-module"
        read_only: false
      - fhir-logs:/var/log/fhir-module
      - config-snapshots:/opt/config-snapshots
    command:
      [
        "python",
        "-m",
        "debugpy",
        "--listen",
        "0.0.0.0:5678",
        "--wait-for-client",
        "-m",
        "gunicorn",
        "--preload",
        "-w",
        "1",
        "-b",
        "0.0.0.0:5000",
        "main:app",
      ]

  fhir-combined-debug:
    build:
      context: .
      dockerfile: Dockerfile.combined
    container_name: fhir-combined-debug
    profiles:
      - combined-debug
    networks:
      - fhir-integration
      - monitoring
    restart: no
    ports:
      - "5001:5000" # FHIR module port
      - "3000:3000" # UI port
      - "5678:5678" # Debug port
    environment:
      BLAZE_URL: "${BLAZE_URL:-http://test-blaze:8080/fhir}"
      MIABIS_BLAZE_URL: "${MIABIS_BLAZE_URL:-http://miabis-blaze:5432/fhir}"
      MIABIS_ON_FHIR: "${MIABIS_ON_FHIR:-True}"
      PYTHONWARNINGS: "ignore:Unverified HTTPS request"
      FLASK_ENV: "development"
      PYTHONUNBUFFERED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    env_file:
      - .env
    volumes:
      - type: bind
        source: "test/xml_data"
        target: "/opt/records"
      - type: bind
        source: "test"
        target: "/opt/test"
      - type: bind
        source: "."
        target: "/opt/fhir-module"
        read_only: false
      - fhir-logs:/var/log/fhir-module
      - ui-data:/app/data
      - config-snapshots:/opt/config-snapshots
    command:
      [
        "/bin/bash",
        "-c",
        "cd /opt/fhir-module && python -m debugpy --listen 0.0.0.0:5678 --wait-for-client -m gunicorn --preload -w 1 -b 0.0.0.0:5000 main:app & cd /opt/ui && node server.js & wait",
      ]

networks:
  fhir-integration:
  monitoring:

volumes:
  fhir-logs:
  ui-data:
  config-snapshots:
